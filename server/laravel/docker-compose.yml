version: '3.8'
services:
  app:
    build: ./server/laravel   # or correct path to Laravel Dockerfile
    image: fitapp_app:latest
    container_name: fitapp_app
    env_file:
      - .env                  # Laravel .env with DB creds, APP_KEY, etc.
    volumes:
      - ./server/laravel:/var/www/html  # for code sync (optional)
    depends_on:
      - mysql
    networks:
      - fitapp-network

  mysql:
    image: mysql:8.0
    container_name: fitapp_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: laravel
      MYSQL_USER: fitapp
      MYSQL_PASSWORD: FitApp2024Secure!
      MYSQL_ROOT_PASSWORD: rootsecret
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - fitapp-network

  adminer:
    image: adminer
    container_name: fitapp_adminer
    restart: unless-stopped
    ports:
      - "8080:8080"   # Adminer on host: http://localhost:8080
    depends_on:
      - mysql
    networks:
      - fitapp-network

  wordpress:
    image: wordpress:6.4-php8.3-fpm-alpine
    container_name: fitapp_wp
    restart: unless-stopped
    env_file:
      - .env                  # same .env with WP DB creds (prefix WORDPRESS_)
    volumes:
      - ./wordpress/wordpress-theme:/var/www/html/wp-content/themes/fitapp-theme
      - ./wordpress/wordpress-pluggin/volt-gym-catalog:/var/www/html/wp-content/plugins/volt-gym-catalog
    depends_on:
      - mysql
    networks:
      - fitapp-network

  # (Optional) If we need Nginx proxy for both app and WP, else WordPress's built-in container has php-fpm + builtin server.
  nginx:
    image: nginx:alpine
    container_name: fitapp_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./server/laravel:/var/www/laravel
    depends_on:
      - app
      - wordpress
    networks:
      - fitapp-network

volumes:
  mysql-data:

networks:
  fitapp-network: