#
# Routing and Security configuration for the Nginx reverse proxy.
#
# Responsibility: Manages protocol termination (HTTP/HTTPS), virtual hosting, 
#                 and isolated delivery of static assets for multiple applications.
# Isolation: Each server block acts as an independent virtual host.
#

# ─── WORDPRESS FRONTEND (MAIN WEBSITE) ────────────────────────────────────────
server {
    listen 80;
    listen 443 ssl;
    server_name _;

    ssl_certificate /etc/nginx/ssl/certificate.crt;
    ssl_certificate_key /etc/nginx/ssl/private.key;

    root /var/www/wordpress;
    index index.php index.html;

    location / {
        try_files $uri $uri/ /index.php?$args;
    }

    # "More accessible" images: Serve Laravel profile photos directly from port 80
    location ^~ /uploads/ {
        root /var/www/laravel/public;
        expires 30d;
        add_header Cache-Control "public, no-transform";
        try_files $uri =404;
    }

    location ~ \.php$ {
        fastcgi_pass wordpress:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_read_timeout 120;
    }

    location ~ /\.ht {
        deny all;
    }

    location ~* \.(jpg|jpeg|png|gif|ico|css|js|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, no-transform";
        try_files $uri =404;
    }

    client_max_body_size 64M;
    error_log  /var/log/nginx/wordpress_error.log;
    access_log /var/log/nginx/wordpress_access.log;
}

# ─── LARAVEL API ──────────────────────────────────────────────────────────────
server {
    listen 8000;
    listen 8443 ssl;
    server_name _;                  

    ssl_certificate /etc/nginx/ssl/certificate.crt;
    ssl_certificate_key /etc/nginx/ssl/private.key;

    root /var/www/laravel/public;
    index index.php;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass laravel:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_read_timeout 120;
    }

    location ~ /\.ht {
        deny all;
    }

    # Security: Explicit protection of application storage and system directories.
    location ^~ /storage {
        deny all;
        return 403;
    }

    # Delivery of static assets for the API application.
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, no-transform";
        try_files $uri =404;
    }

    client_max_body_size 10M;
    error_log  /var/log/nginx/laravel_error.log;
    access_log /var/log/nginx/laravel_access.log;
}
